version: "3"
services:
  ogc-server:
    container_name: ogc-mcp-server
    image: geopython/pygeoapi:latest
    ports:
      - "5000:80"  
    volumes:
      - ./my_config.yml:/pygeoapi/local.config.yml
    environment:
      - PYGEOAPI_CONFIG=/pygeoapi/local.config.yml
      - PYGEOAPI_SERVER_URL=http://localhost:5000